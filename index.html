<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環球財經簡報 | Global Finance Brief - 實時</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E8C1;
            --dark-bg: #0a0e1a;
            --card-bg: rgba(20, 25, 40, 0.8);
            --border: rgba(212, 175, 55, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --positive: #22c55e;
            --negative: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--positive);
            border-radius: 50%;
            animation: pulse 1s infinite;
            margin-right: 6px;
        }
        
        @keyframes flashGreen {
            0% { color: var(--positive); text-shadow: 0 0 10px var(--positive); }
            100% { color: var(--text-primary); }
        }
        
        @keyframes flashRed {
            0% { color: var(--negative); text-shadow: 0 0 10px var(--negative); }
            100% { color: var(--text-primary); }
        }
        
        .flash-up { animation: flashGreen 0.8s ease-out; }
        .flash-down { animation: flashRed 0.8s ease-out; }
        
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 2px solid var(--gold);
            padding: 40px 20px;
            text-align: center;
        }
        
        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px; }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--positive);
            font-weight: 600;
            background: rgba(34, 197, 94, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--gold);
        }
        
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        
        .market-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .market-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .market-name { font-weight: 600; }
        
        .market-price {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .market-change {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-top-color: var(--positive);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .last-update {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="logo">📊 環球財經簡報</h1>
        <p class="subtitle">Global Finance Brief · 實時跳動</p>
        <span class="live-badge">
            <span class="live-dot"></span>
            🔴 LIVE 實時數據 · 每 30 秒更新
        </span>
    </header>

    <main class="container">
        <section class="section">
            <div class="section-header">
                <span style="font-size: 1.8rem;">🌍</span>
                <h2 class="section-title">環球指數 - 實時跳動</h2>
            </div>
            
            <div class="market-grid">
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇭🇰 恆生指數</span>
                        <span class="loading" id="hsi-loading"></span>
                    </div>
                    <div class="market-price" id="hsi-price">--</div>
                    <div class="market-change" id="hsi-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇺🇸 道瓊斯</span>
                        <span class="loading" id="dow-loading"></span>
                    </div>
                    <div class="market-price" id="dow-price">--</div>
                    <div class="market-change" id="dow-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇺🇸 納斯達克</span>
                        <span class="loading" id="nasdaq-loading"></span>
                    </div>
                    <div class="market-price" id="nasdaq-price">--</div>
                    <div class="market-change" id="nasdaq-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇺🇸 標普500</span>
                        <span class="loading" id="sp500-loading"></span>
                    </div>
                    <div class="market-price" id="sp500-price">--</div>
                    <div class="market-change" id="sp500-change">--</div>
                </div>
            </div>
            
            <p class="last-update" id="last-update">更新中...</p>
        </section>

        <section class="section">
            <div class="section-header">
                <span style="font-size: 1.8rem;">₿</span>
                <h2 class="section-title">加密貨幣 - 實時</h2>
            </div>
            
            <div class="market-grid">
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">Bitcoin (BTC)</span>
                        <span class="loading" id="btc-loading"></span>
                    </div>
                    <div class="market-price" id="btc-price">--</div>
                    <div class="market-change" id="btc-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">Ethereum (ETH)</span>
                        <span class="loading" id="eth-loading"></span>
                    </div>
                    <div class="market-price" id="eth-price">--</div>
                    <div class="market-change" id="eth-change">--</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span style="font-size: 1.8rem;">🛢️</span>
                <h2 class="section-title">大宗商品 - 實時</h2>
            </div>
            
            <div class="market-grid">
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🥇 現貨黃金</span>
                        <span class="loading" id="gold-loading"></span>
                    </div>
                    <div class="market-price" id="gold-price">--</div>
                    <div class="market-change" id="gold-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🛢️ WTI原油</span>
                        <span class="loading" id="oil-loading"></span>
                    </div>
                    <div class="market-price" id="oil-price">--</div>
                    <div class="market-change" id="oil-change">--</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 儲存上一次價格
        const lastPrices = {};
        
        // 更新時間顯示
        function updateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent = 
                '最後更新: ' + now.toLocaleString('zh-HK');
        }
        
        // 更新價格（帶跳動效果）
        function updatePrice(id, newPrice, oldPrice) {
            const el = document.getElementById(id);
            if (!el) return;
            
            el.classList.remove('flash-up', 'flash-down');
            
            // 格式化數字
            const formatted = newPrice >= 1000 
                ? newPrice.toLocaleString('en-US', {minimumFractionDigits: 2})
                : newPrice.toFixed(2);
            
            el.textContent = formatted;
            
            // 比較舊價格加動畫
            if (oldPrice && newPrice !== oldPrice) {
                el.classList.add(newPrice > oldPrice ? 'flash-up' : 'flash-down');
            }
            
            // 隱藏 loading
            const loading = document.getElementById(id.replace('-price', '-loading'));
            if (loading) loading.style.display = 'none';
        }
        
        // 更新變動
        function updateChange(id, percent) {
            const el = document.getElementById(id);
            if (!el) return;
            
            const isUp = percent >= 0;
            const arrow = isUp ? '▲' : '▼';
            const sign = isUp ? '+' : '';
            
            el.innerHTML = `${arrow} ${sign}${percent.toFixed(2)}%`;
            el.className = 'market-change ' + (isUp ? 'positive' : 'negative');
        }
        
        // 用 JSONP 抓 Yahoo Finance 數據
        function fetchYahoo(symbol, callback) {
            const script = document.createElement('script');
            const callbackName = 'yf_' + Date.now();
            
            window[callbackName] = function(data) {
                callback(data);
                delete window[callbackName];
                document.head.removeChild(script);
            };
            
            // Yahoo Finance JSONP endpoint
            script.src = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d&callback=${callbackName}`;
            script.onerror = () => {
                delete window[callbackName];
                document.head.removeChild(script);
                callback(null);
            };
            
            document.head.appendChild(script);
        }
        
        // 抓 Crypto 數據（CoinGecko 支援 CORS）
        async function fetchCrypto() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                
                if (data.bitcoin) {
                    updatePrice('btc-price', data.bitcoin.usd, lastPrices.btc);
                    updateChange('btc-change', data.bitcoin.usd_24h_change || 0);
                    lastPrices.btc = data.bitcoin.usd;
                }
                
                if (data.ethereum) {
                    updatePrice('eth-price', data.ethereum.usd, lastPrices.eth);
                    updateChange('eth-change', data.ethereum.usd_24h_change || 0);
                    lastPrices.eth = data.ethereum.usd;
                }
            } catch (e) {
                console.error('Crypto fetch failed:', e);
            }
        }
        
        // 更新所有數據
        function updateAll() {
            // 港股 - 恆生
            fetchYahoo('%5EHSI', (data) => {
                if (data?.chart?.result?.[0]) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice || meta.previousClose;
                    const prev = meta.previousClose || price;
                    const change = prev ? ((price - prev) / prev * 100) : 0;
                    
                    updatePrice('hsi-price', price, lastPrices.hsi);
                    updateChange('hsi-change', change);
                    lastPrices.hsi = price;
                }
            });
            
            // 道指
            fetchYahoo('%5EDJI', (data) => {
                if (data?.chart?.result?.[0]) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice || meta.previousClose;
                    const prev = meta.previousClose || price;
                    const change = prev ? ((price - prev) / prev * 100) : 0;
                    
                    updatePrice('dow-price', price, lastPrices.dow);
                    updateChange('dow-change', change);
                    lastPrices.dow = price;
                }
            });
            
            // 納指
            fetchYahoo('%5EIXIC', (data) => {
                if (data?.chart?.result?.[0]) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice || meta.previousClose;
                    const prev = meta.previousClose || price;
                    const change = prev ? ((price - prev) / prev * 100) : 0;
                    
                    updatePrice('nasdaq-price', price, lastPrices.nasdaq);
                    updateChange('nasdaq-change', change);
                    lastPrices.nasdaq = price;
                }
            });
            
            // 標普500
            fetchYahoo('%5EGSPC', (data) => {
                if (data?.chart?.result?.[0]) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice || meta.previousClose;
                    const prev = meta.previousClose || price;
                    const change = prev ? ((price - prev) / prev * 100) : 0;
                    
                    updatePrice('sp500-price', price, lastPrices.sp500);
                    updateChange('sp500-change', change);
                    lastPrices.sp500 = price;
                }
            });
            
            // 黃金
            fetchYahoo('GC%3DF', (data) => {
                if (data?.chart?.result?.[0]) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice || 0;
                    
                    updatePrice('gold-price', price, lastPrices.gold);
                    lastPrices.gold = price;
                    
                    const loading = document.getElementById('gold-loading');
                    if (loading) loading.style.display = 'none';
                }
            });
            
            // 原油
            fetchYahoo('CL%3DF', (data) => {
                if (data?.chart?.result?.[0]) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice || 0;
                    
                    updatePrice('oil-price', price, lastPrices.oil);
                    lastPrices.oil = price;
                    
                    const loading = document.getElementById('oil-loading');
                    if (loading) loading.style.display = 'none';
                }
            });
            
            // Crypto
            fetchCrypto();
            
            updateTime();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateAll();
            setInterval(updateAll, 30000); // 每 30 秒更新
            console.log('🚀 實時數據已啟動');
        });
    </script>
</body>
</html>
