<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環球財經簡報 | Global Finance Brief - 實時</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E8C1;
            --dark-bg: #0a0e1a;
            --card-bg: rgba(20, 25, 40, 0.8);
            --border: rgba(212, 175, 55, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --positive: #22c55e;
            --negative: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--positive);
            border-radius: 50%;
            animation: pulse 1s infinite;
            margin-right: 6px;
        }
        
        @keyframes flashGreen {
            0% { color: var(--positive); text-shadow: 0 0 10px var(--positive); }
            100% { color: var(--text-primary); }
        }
        
        @keyframes flashRed {
            0% { color: var(--negative); text-shadow: 0 0 10px var(--negative); }
            100% { color: var(--text-primary); }
        }
        
        .flash-up { animation: flashGreen 0.8s ease-out; }
        .flash-down { animation: flashRed 0.8s ease-out; }
        
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 2px solid var(--gold);
            padding: 40px 20px;
            text-align: center;
        }
        
        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px; }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--positive);
            font-weight: 600;
            background: rgba(34, 197, 94, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--gold);
        }
        
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        
        .market-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .market-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .market-name { font-weight: 600; }
        
        .market-price {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .market-change {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-top-color: var(--positive);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .last-update {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .error-msg {
            color: var(--negative);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="logo">📊 環球財經簡報</h1>
        <p class="subtitle">Global Finance Brief · 實時跳動</p>
        <span class="live-badge">
            <span class="live-dot"></span>
            🔴 LIVE 實時數據
        </span>
    </header>

    <main class="container">
        <section class="section">
            <div class="section-header">
                <span style="font-size: 1.8rem;">🌍</span>
                <h2 class="section-title">環球指數</h2>
            </div>
            
            <div class="market-grid">
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇭🇰 恆生指數</span>
                        <span class="loading" id="hsi-loading"></span>
                    </div>
                    <div class="market-price" id="hsi-price">--</div>
                    <div class="market-change" id="hsi-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇺🇸 道瓊斯</span>
                        <span class="loading" id="dow-loading"></span>
                    </div>
                    <div class="market-price" id="dow-price">--</div>
                    <div class="market-change" id="dow-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇺🇸 納斯達克</span>
                        <span class="loading" id="nasdaq-loading"></span>
                    </div>
                    <div class="market-price" id="nasdaq-price">--</div>
                    <div class="market-change" id="nasdaq-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🇺🇸 標普500</span>
                        <span class="loading" id="sp500-loading"></span>
                    </div>
                    <div class="market-price" id="sp500-price">--</div>
                    <div class="market-change" id="sp500-change">--</div>
                </div>
            </div>
            
            <p class="last-update" id="last-update">更新中...</p>
            <p class="error-msg" id="error-msg"></p>
        </section>

        <section class="section">
            <div class="section-header">
                <span style="font-size: 1.8rem;">₿</span>
                <h2 class="section-title">加密貨幣</h2>
            </div>
            
            <div class="market-grid">
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">Bitcoin (BTC)</span>
                        <span class="loading" id="btc-loading"></span>
                    </div>
                    <div class="market-price" id="btc-price">--</div>
                    <div class="market-change" id="btc-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">Ethereum (ETH)</span>
                        <span class="loading" id="eth-loading"></span>
                    </div>
                    <div class="market-price" id="eth-price">--</div>
                    <div class="market-change" id="eth-change">--</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span style="font-size: 1.8rem;">🛢️</span>
                <h2 class="section-title">大宗商品</h2>
            </div>
            
            <div class="market-grid">
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🥇 黃金</span>
                        <span class="loading" id="gold-loading"></span>
                    </div>
                    <div class="market-price" id="gold-price">--</div>
                    <div class="market-change" id="gold-change">--</div>
                </div>
                
                <div class="market-card">
                    <div class="market-header">
                        <span class="market-name">🛢️ 原油</span>
                        <span class="loading" id="oil-loading"></span>
                    </div>
                    <div class="market-price" id="oil-price">--</div>
                    <div class="market-change" id="oil-change">--</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Twelve Data API Key (免費版)
        const API_KEY = 'demo'; // 用戶可以自己申請免費 key
        
        const lastPrices = {};
        
        function updateTime() {
            document.getElementById('last-update').textContent = 
                '最後更新: ' + new Date().toLocaleString('zh-HK');
        }
        
        function updatePrice(id, newPrice, oldPrice) {
            const el = document.getElementById(id);
            if (!el) return;
            
            el.classList.remove('flash-up', 'flash-down');
            
            const formatted = newPrice >= 1000 
                ? newPrice.toLocaleString('en-US', {minimumFractionDigits: 2})
                : newPrice.toFixed(2);
            
            el.textContent = formatted;
            
            if (oldPrice && newPrice !== oldPrice) {
                el.classList.add(newPrice > oldPrice ? 'flash-up' : 'flash-down');
            }
            
            const loading = document.getElementById(id.replace('-price', '-loading'));
            if (loading) loading.style.display = 'none';
        }
        
        function updateChange(id, percent) {
            const el = document.getElementById(id);
            if (!el) return;
            
            const isUp = percent >= 0;
            const arrow = isUp ? '▲' : '▼';
            const sign = isUp ? '+' : '';
            
            el.innerHTML = `${arrow} ${sign}${percent.toFixed(2)}%`;
            el.className = 'market-change ' + (isUp ? 'positive' : 'negative');
        }
        
        // Twelve Data API (支援 CORS)
        async function fetchTwelveData(symbol, elementId) {
            try {
                const url = `https://api.twelvedata.com/quote?symbol=${symbol}&apikey=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.status === 'error') {
                    console.error(`${symbol} error:`, data.message);
                    return null;
                }
                
                return {
                    price: parseFloat(data.close || data.price),
                    change: parseFloat(data.percent_change || 0)
                };
            } catch (e) {
                console.error(`${symbol} fetch failed:`, e);
                return null;
            }
        }
        
        // CoinGecko API (Crypto, 支援 CORS)
        async function fetchCrypto() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                
                if (data.bitcoin) {
                    updatePrice('btc-price', data.bitcoin.usd, lastPrices.btc);
                    updateChange('btc-change', data.bitcoin.usd_24h_change || 0);
                    lastPrices.btc = data.bitcoin.usd;
                }
                
                if (data.ethereum) {
                    updatePrice('eth-price', data.ethereum.usd, lastPrices.eth);
                    updateChange('eth-change', data.ethereum.usd_24h_change || 0);
                    lastPrices.eth = data.ethereum.usd;
                }
            } catch (e) {
                console.error('Crypto error:', e);
            }
        }
        
        // 更新所有數據
        async function updateAll() {
            // 股票指數 (用 Twelve Data)
            const indices = [
                { symbol: 'HSI', id: 'hsi', name: '恆生' },
                { symbol: 'DJI', id: 'dow', name: '道指' },
                { symbol: 'IXIC', id: 'nasdaq', name: '納指' },
                { symbol: 'SPX', id: 'sp500', name: '標普' }
            ];
            
            for (const idx of indices) {
                const data = await fetchTwelveData(idx.symbol, idx.id);
                if (data) {
                    updatePrice(`${idx.id}-price`, data.price, lastPrices[idx.id]);
                    updateChange(`${idx.id}-change`, data.change);
                    lastPrices[idx.id] = data.price;
                }
            }
            
            // 商品 (用 Twelve Data)
            const commodities = [
                { symbol: 'XAUUSD', id: 'gold', name: '黃金' },
                { symbol: 'WTI', id: 'oil', name: '原油' }
            ];
            
            for (const comm of commodities) {
                const data = await fetchTwelveData(comm.symbol, comm.id);
                if (data) {
                    updatePrice(`${comm.id}-price`, data.price, lastPrices[comm.id]);
                    updateChange(`${comm.id}-change`, data.change);
                    lastPrices[comm.id] = data.price;
                }
            }
            
            // Crypto
            await fetchCrypto();
            
            updateTime();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateAll();
            setInterval(updateAll, 60000); // 每分鐘更新（免費 API limit）
            console.log('🚀 實時數據已啟動 (Twelve Data)');
        });
    </script>
</body>
</html>
